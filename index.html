<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Stable Slime System</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

video {
  position: fixed;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
  
}

#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 1;

  background: radial-gradient(
    circle at center,
    rgba(120, 220, 255, 0.08),
    rgba(0, 40, 90, 0.35)
  );

  mix-blend-mode: screen;
}

#container {
  position: fixed;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
}

.slime {
  position: absolute;
  width: 220px;
  height: 220px;
  left: 0;
  top: 0;
}

button {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  padding: 10px 18px;
}

#debug {
  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
  font-family: monospace;
  font-size: 12px;
  background: rgba(0,0,0,0.5);
  padding: 6px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="container"></div>
<div id="overlay"></div>

<!-- 🟢模板（只用来clone） -->
<div id="template" class="slime">
<svg viewBox="0 0 200 200">
  <path class="blob" fill="url(#grad)"></path>

  <defs>
    <radialGradient id="grad">
      <stop offset="0%" stop-color="rgba(180,230,255,0.95)" />
      <stop offset="40%" stop-color="rgba(80,170,255,0.8)" />
      <stop offset="100%" stop-color="rgba(0,90,255,0.35)" />
    </radialGradient>
  </defs>
</svg>
</div>

<button id="btn">启动</button>
<div id="debug">ready</div>

<script>

const video = document.getElementById("video");
const container = document.getElementById("container");
const debug = document.getElementById("debug");

let slimes = [];
let running = false;

/* 🟢 摄像头 */
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
  });

  video.srcObject = stream;
}

/* 🟢 创建3个史莱姆（稳定版） */
function createSlimes() {

  const sizes = [3.4, 3, 2.8, 2.6, 2.2];

  const template = document.getElementById("template");

  for (let i = 0; i < 5; i++) {

    let node = template.cloneNode(true);
    node.removeAttribute("id");
    container.appendChild(node);

    slimes.push({
      el: node,
      blob: node.querySelector(".blob"),

      x: window.innerWidth * (0.2 + i * 0.15),
      y: window.innerHeight * (0.35 + (i % 2) * 0.3),

      vx: 0,
      vy: 0,

      scale: sizes[i]
    });
  }

  template.remove();
}

/* 🟢 touch控制（只控制最大） */
window.addEventListener("touchmove", (e) => {

  if (!slimes[0]) return;

  let t = e.touches[0];

  let dx = t.clientX - window.innerWidth / 2;
  let dy = t.clientY - window.innerHeight / 2;

  slimes[0].vx += dx * 0.0007;
  slimes[0].vy += dy * 0.0007;
});

/* 🟢 blob */
function makeBlob(time, offset = 0) {

  const points = 20;
  const step = Math.PI * 2 / points;

  let path = "";

  for (let i = 0; i < points; i++) {

    let a = i * step;

    let wave =
      Math.sin(i * 0.8 + time * 0.002 + offset) * 6 +
      Math.sin(i * 1.7 - time * 0.0015 + offset) * 4;

    let r = 80 + wave;

    let x = 100 + Math.cos(a) * r;
    let y = 100 + Math.sin(a) * r;

    path += (i === 0 ? "M" : "L") + x + " " + y + " ";
  }

  return path + "Z";
}

/* 🟢 update（稳定物理） */
function update() {

  if (!running) return;

  // move
  for (let s of slimes) {

    s.vx *= 0.95;
    s.vy *= 0.95;

    s.vx += (Math.random() - 0.5) * 0.08;
    s.vy += (Math.random() - 0.5) * 0.08;

    s.x += s.vx;
    s.y += s.vy;
  }

  // collision
  for (let i = 0; i < slimes.length; i++) {
    for (let j = i + 1; j < slimes.length; j++) {

      let a = slimes[i];
      let b = slimes[j];

      let dx = b.x - a.x;
      let dy = b.y - a.y;

      let dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
      let minDist = 150;

      if (dist < minDist) {

        let force = (minDist - dist) * 0.02;

        let nx = dx / dist;
        let ny = dy / dist;

        a.vx -= nx * force;
        a.vy -= ny * force;

        b.vx += nx * force;
        b.vy += ny * force;
      }
    }
  }

  // render
  for (let s of slimes) {

    s.x = Math.max(80, Math.min(window.innerWidth - 80, s.x));
    s.y = Math.max(80, Math.min(window.innerHeight - 80, s.y));

    let angle = Math.atan2(s.vy, s.vx);

    let stretchX = 1 + s.vx * 0.02;
    let stretchY = 1 - s.vy * 0.02;

    s.el.style.transform =
      `translate(${s.x - 110}px, ${s.y - 110}px)
       rotate(${angle}rad)
       scale(${s.scale * stretchX}, ${s.scale * stretchY})`;

    s.blob.setAttribute("d", makeBlob(performance.now(), s.scale));
  }

  requestAnimationFrame(update);
}

/* 🟢 启动 */
document.getElementById("btn").onclick = async () => {

  await startCamera();

  createSlimes();

  running = true;

  update();
};

</script>

</body>
</html>
