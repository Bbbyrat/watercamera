<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Slime Base System</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

video {
  position: fixed;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

#container {
  position: fixed;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
}

.slime {
  position: absolute;
  width: 220px;
  height: 220px;
  left: 0;
  top: 0;
}

button {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 16px;
  z-index: 10;
}

#debug {
  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
  font-family: monospace;
  font-size: 12px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="container"></div>

<!-- 模板 -->
<div id="template" class="slime">
<svg viewBox="0 0 200 200">
  <path class="blob" fill="rgba(100,180,255,0.8)"></path>
</svg>
</div>

<button id="btn">启动</button>
<div id="debug">ready</div>

<script>

const video = document.getElementById("video");
const container = document.getElementById("container");
const debug = document.getElementById("debug");

let slimes = [];
let running = false;

/* 摄像头 */
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
  });

  video.srcObject = stream;
}

/* 创建3个 */
function createSlimes() {

  const template = document.getElementById("template");

  for (let i = 0; i < 3; i++) {

    let node = template.cloneNode(true);
    node.removeAttribute("id");
    container.appendChild(node);

    slimes.push({
      el: node,
      blob: node.querySelector(".blob"),

      x: window.innerWidth * (0.3 + i * 0.2),
      y: window.innerHeight * 0.5,

      vx: 0,
      vy: 0
    });
  }

  template.remove();
}

/* touch 风力 */
window.addEventListener("touchmove", (e) => {

  if (!slimes[0]) return;

  let t = e.touches[0];

  for (let s of slimes) {

    let dx = t.clientX - s.x;
    let dy = t.clientY - s.y;

    s.vx += dx * 0.0005;
    s.vy += dy * 0.0005;
  }
});

/* blob */
function makeBlob(time) {

  const points = 18;
  const step = Math.PI * 2 / points;

  let path = "";

  for (let i = 0; i < points; i++) {

    let a = i * step;

    let wave =
      Math.sin(i * 0.8 + time * 0.002) * 6 +
      Math.sin(i * 1.7 - time * 0.0015) * 4;

    let r = 80 + wave;

    let x = 100 + Math.cos(a) * r;
    let y = 100 + Math.sin(a) * r;

    path += (i === 0 ? "M" : "L") + x + " " + y + " ";
  }

  return path + "Z";
}

/* 更新 */
function update() {

  if (!running) {
    requestAnimationFrame(update);
    return;
  }

  for (let s of slimes) {

    s.vx *= 0.95;
    s.vy *= 0.95;

    s.x += s.vx;
    s.y += s.vy;

    s.x = Math.max(80, Math.min(window.innerWidth - 80, s.x));
    s.y = Math.max(80, Math.min(window.innerHeight - 80, s.y));

    let angle = Math.atan2(s.vy, s.vx);

    s.el.style.transform =
      `translate(${s.x - 110}px, ${s.y - 110}px)
       rotate(${angle}rad)
       scale(2.5)`;

    s.blob.setAttribute("d", makeBlob(performance.now()));
  }

  debug.innerText = `slimes: ${slimes.length}`;

  requestAnimationFrame(update);
}

/* 启动 */
document.getElementById("btn").onclick = async () => {

  await startCamera();

  createSlimes();

  running = true;

  update();
};

</script>

</body>
</html>
