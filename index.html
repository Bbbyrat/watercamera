<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Camera Slime Touch</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
    }

    button {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 12px 20px;
      font-size: 16px;
    }

    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 99999;
      color: white;
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 8px;
      border-radius: 6px;
      font-family: monospace;
    }

    #slime {
      position: fixed;
      width: 120px;
      height: 120px;
      border-radius: 50%;

      background: radial-gradient(
        circle at 30% 30%,
        rgba(255, 255, 255, 0.9),
        rgba(140, 210, 255, 0.75),
        rgba(40, 120, 255, 0.6)
      );

      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);

      box-shadow:
        0 0 25px rgba(120, 200, 255, 0.4),
        inset -10px -10px 20px rgba(0, 80, 200, 0.2);

      mix-blend-mode: screen;

      left: 0;
      top: 0;

      z-index: 9999;
      opacity: 0.9;

      transform-origin: center;
    }
  </style>
</head>

<body>

  <video id="video" autoplay playsinline></video>

  <div id="slime"></div>

  <div id="debug">touch to move slime</div>

  <button id="snap">启动</button>
  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById("video");
    const button = document.getElementById("snap");
    const slime = document.getElementById("slime");
    const debug = document.getElementById("debug");

    let x = window.innerWidth / 2;
    let y = window.innerHeight / 2;

    let vx = 0;
    let vy = 0;

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });

      video.srcObject = stream;
    }

    // 🧠 核心改动：用手指控制“重力方向”
    window.addEventListener("touchmove", (e) => {
      let t = e.touches[0];

      let dx = t.clientX - window.innerWidth / 2;
      let dy = t.clientY - window.innerHeight / 2;

      vx += dx * 0.0008;
      vy += dy * 0.0008;

      debug.innerText =
        "touch dx: " + dx.toFixed(1) +
        "\ntouch dy: " + dy.toFixed(1);
    });

    function update() {
      vx *= 0.95;
      vy *= 0.95;

      x += vx;
      y += vy;

      x = Math.max(60, Math.min(window.innerWidth - 60, x));
      y = Math.max(60, Math.min(window.innerHeight - 60, y));

      let speed = Math.sqrt(vx * vx + vy * vy);

      let stretchX = 1 + speed * 0.03;
      let stretchY = 1 - speed * 0.02;

      slime.style.transform = `
        translate(${x}px, ${y}px)
        translate(-60px, -60px)
        scale(${stretchX}, ${stretchY})
      `;

      requestAnimationFrame(update);
    }

    button.onclick = async function () {
      await startCamera();
    };

    update();
  </script>

</body>
</html>
