<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Camera Slime</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
    }

    button {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 12px 20px;
      font-size: 16px;
    }

    #slime {
      position: fixed;
      width: 120px;
      height: 120px;
      border-radius: 50%;

      background: radial-gradient(
        circle at 30% 30%,
        rgba(255, 255, 255, 0.9),
        rgba(140, 210, 255, 0.75),
        rgba(40, 120, 255, 0.6)
      );

      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);

      box-shadow:
        0 0 25px rgba(120, 200, 255, 0.4),
        inset -10px -10px 20px rgba(0, 80, 200, 0.2);

      mix-blend-mode: screen;

      left: 0;
      top: 0;

      z-index: 9999;
      opacity: 0.9;

      transform-origin: center;
    }
  </style>
</head>

<body>

  <video id="video" autoplay playsinline></video>

  <div id="slime"></div>

  <button id="snap">启动 + 拍照</button>
  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById("video");
    const button = document.getElementById("snap");
    const canvas = document.getElementById("canvas");
    const context = canvas.getContext("2d");

    const slime = document.getElementById("slime");

    let x = window.innerWidth / 2;
    let y = window.innerHeight / 2;

    let vx = 0;
    let vy = 0;

    async function startCamera() {
      
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });

      video.srcObject = stream;
    }

    async function enableMotion() {
      if (typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function") {

        const permission = await DeviceOrientationEvent.requestPermission();

        if (permission !== "granted") {
          alert("没有陀螺仪权限");
          return;
        }
      }

      window.addEventListener("deviceorientation", (event) => {
        let gamma = event.gamma || 0;
        let beta = event.beta || 0;

        vx += gamma * 0.05;
        vy += beta * 0.05;
        console.log("motion:", event.gamma, event.beta);
      });
    }

    function update() {
      vx *= 0.95;
      vy *= 0.95;

      x += vx;
      y += vy;

      let speed = Math.sqrt(vx * vx + vy * vy);

      let stretchX = 1 + speed * 0.03;
      let stretchY = 1 - speed * 0.02;

      slime.style.transform = `
        translate(${x}px, ${y}px)
        translate(-60px, -60px)
        scale(${stretchX}, ${stretchY})
      `;

      requestAnimationFrame(update);
    }

    button.onclick = async function () {
      await startCamera();
      await enableMotion();
    };

    update();
  </script>

</body>
</html>
