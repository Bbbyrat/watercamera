<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Camera Slime Debug</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
    }

    button {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 12px 20px;
      font-size: 16px;
    }

    /* 🧠 调试面板 */
    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 99999;
      color: white;
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 8px;
      border-radius: 6px;
      font-family: monospace;
    }

    #slime {
      position: fixed;
      width: 120px;
      height: 120px;
      border-radius: 50%;

      background: radial-gradient(
        circle at 30% 30%,
        rgba(255, 255, 255, 0.9),
        rgba(140, 210, 255, 0.75),
        rgba(40, 120, 255, 0.6)
      );

      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);

      box-shadow:
        0 0 25px rgba(120, 200, 255, 0.4),
        inset -10px -10px 20px rgba(0, 80, 200, 0.2);

      mix-blend-mode: screen;

      left: 0;
      top: 0;

      z-index: 9999;
      opacity: 0.9;

      transform-origin: center;
    }
  </style>
</head>

<body>

  <video id="video" autoplay playsinline></video>

  <div id="slime"></div>

  <!-- 🧠 调试显示 -->
  <div id="debug">waiting...</div>

  <button id="snap">启动</button>
  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById("video");
    const button = document.getElementById("snap");
    const slime = document.getElementById("slime");
    const debug = document.getElementById("debug");

    let x = window.innerWidth / 2;
    let y = window.innerHeight / 2;

    let vx = 0;
    let vy = 0;

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });

      video.srcObject = stream;
    }

    async function enableMotion() {

  debug.innerText = "requesting motion...";

  // ❗不再用 requestPermission（很多浏览器直接失败）

  function handleMotion(event) {

    let gamma = event.gamma;
    let beta = event.beta;

    if (gamma === null && beta === null) {
      debug.innerText = "motion blocked";
      return;
    }

    // 🧠 更新显示
    debug.innerText =
      "gamma: " + (gamma?.toFixed(2) || 0) +
      "\nbeta: " + (beta?.toFixed(2) || 0);

    vx += (gamma || 0) * 0.08;
    vy += (beta || 0) * 0.08;
  }

  window.addEventListener("deviceorientation", handleMotion);

  // 🧠 强制提示（判断有没有进来）
  setTimeout(() => {
    if (debug.innerText === "requesting motion...") {
      debug.innerText = "no motion event detected";
    }
  }, 2000);
}

    function update() {
      vx *= 0.95;
      vy *= 0.95;

      x += vx;
      y += vy;

      x = Math.max(60, Math.min(window.innerWidth - 60, x));
      y = Math.max(60, Math.min(window.innerHeight - 60, y));

      let speed = Math.sqrt(vx * vx + vy * vy);

      let stretchX = 1 + speed * 0.03;
      let stretchY = 1 - speed * 0.02;

      slime.style.transform = `
        translate(${x}px, ${y}px)
        translate(-60px, -60px)
        scale(${stretchX}, ${stretchY})
      `;

      requestAnimationFrame(update);
    }

   button.onclick = async function () {
     await startCamera();
     enableMotion(); 
   };
    update();
  </script>

</body>
</html>
