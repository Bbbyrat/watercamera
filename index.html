<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Slime Fix</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

video {
  position: fixed;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

.slime {
  position: fixed;
  width: 220px;
  height: 220px;
  left: 0;
  top: 0;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<!-- 🟢模板 -->
<div id="slime" class="slime">
<svg viewBox="0 0 200 200">
  <path fill="url(#grad)" d="M100 100"></path>

  <defs>
    <radialGradient id="grad">
      <stop offset="0%" stop-color="rgba(255,255,255,0.8)" />
      <stop offset="100%" stop-color="rgba(40,120,255,0.4)" />
    </radialGradient>
  </defs>
</svg>
</div>

<button id="snap" style="position:fixed;bottom:20px;">启动</button>

<script>

const video = document.getElementById("video");
const button = document.getElementById("snap");

let slimes = [];

/* 🟢 摄像头 */
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
  });

  video.srcObject = stream;
}

/* 🟢 创建3个 */
function createSlimes() {

  const sizes = [3.2, 2.2, 1.4];

  const template = document.getElementById("slime");

  for (let i = 0; i < 3; i++) {

    let node = template.cloneNode(true);
    node.removeAttribute("id");
    document.body.appendChild(node);

    slimes.push({
      el: node,
      x: window.innerWidth * (0.3 + i * 0.2),
      y: window.innerHeight * 0.5,
      vx: 0,
      vy: 0,
      scale: sizes[i]
    });
  }

  template.remove();
}

/* 🟢 touch */
window.addEventListener("touchmove", (e) => {

  let t = e.touches[0];

  let dx = t.clientX - window.innerWidth / 2;
  let dy = t.clientY - window.innerHeight / 2;

  slimes[0].vx += dx * 0.0008;
  slimes[0].vy += dy * 0.0008;
});

/* 🟢 update */
function update() {

  for (let s of slimes) {
    s.vx *= 0.95;
    s.vy *= 0.95;

    s.x += s.vx;
    s.y += s.vy;
  }

  for (let s of slimes) {

    s.x = Math.max(80, Math.min(window.innerWidth - 80, s.x));
    s.y = Math.max(80, Math.min(window.innerHeight - 80, s.y));

    let angle = Math.atan2(s.vy, s.vx);

    s.el.style.transform =
      `translate(${s.x - 110}px, ${s.y - 110}px)
       rotate(${angle}rad)
       scale(${s.scale})`;
  }

  requestAnimationFrame(update);
}

/* 🟢 启动 */
button.onclick = async () => {
  await startCamera();
  createSlimes();
  update();
};

</script>

</body>
</html>
