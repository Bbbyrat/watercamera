<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Stable Slime System</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(180deg, #001a4d, #003a99);
}

/* 外框 */
#frame {
  position: fixed;
  width: 80vw;
  height: 80vh;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);

  border: 6px solid #1e90ff;
  box-shadow:
    0 0 15px #1e90ff,
    0 0 40px rgba(30,144,255,0.6),
    inset 0 0 30px rgba(0,80,200,0.4);

  overflow: hidden;
}

/* 摄像头 */
video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}

/* 史莱姆层 */
#container {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 2;
}

/* 史莱姆 */
.slime {
  position: absolute;
  width: 220px;
  height: 220px;
}

/* footer */
#footer {
  position: absolute;
  bottom: 20px;
  left: 0;
  width: 100%;

  display: flex;
  justify-content: space-evenly;
  align-items: center;

  pointer-events: none;
}

#footer img {
  width: 300px;
  height: auto;
  opacity: 0.9;
}
</style>
</head>

<body>

<div id="frame">
  <video id="video" autoplay playsinline></video>
  <div id="container"></div>
</div>

<div id="footer">
  <img src="111.jpg" />
  <img src="222.jpg" />
  <img src="333.jpg" />
</div>

<!-- 模板 -->
<div id="template" class="slime">
<svg viewBox="0 0 200 200">
  <path class="blob" fill="rgba(80,170,255,0.7)"></path>
</svg>
</div>

<button id="btn" style="
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:10;
">启动</button>

<script>

const video = document.getElementById("video");
const container = document.getElementById("container");

let slimes = [];
let running = false;

/* 摄像头 */
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
  });

  video.srcObject = stream;
}

/* 创建史莱姆 */
function createSlimes() {

  const sizes = [3.2, 2.2, 1.4];
  const template = document.getElementById("template");

  for (let i = 0; i < 3; i++) {

    let node = template.cloneNode(true);
    node.removeAttribute("id");
    container.appendChild(node);

    slimes.push({
      el: node,
      blob: node.querySelector(".blob"),

      x: window.innerWidth * (0.3 + i * 0.2),
      y: window.innerHeight * 0.5,

      vx: 0,
      vy: 0,

      scale: sizes[i]
    });
  }

  template.remove();
}

/* touch */
window.addEventListener("touchmove", (e) => {
  if (!slimes[0]) return;

  let t = e.touches[0];

  let dx = t.clientX - window.innerWidth / 2;
  let dy = t.clientY - window.innerHeight / 2;

  slimes[0].vx += dx * 0.0007;
  slimes[0].vy += dy * 0.0007;
});

/* blob */
function makeBlob(time, offset = 0) {

  const points = 20;
  const step = Math.PI * 2 / points;

  let path = "";

  for (let i = 0; i < points; i++) {

    let a = i * step;

    let wave =
      Math.sin(i * 0.8 + time * 0.002 + offset) * 6 +
      Math.sin(i * 1.7 - time * 0.0015 + offset) * 4;

    let r = 80 + wave;

    let x = 100 + Math.cos(a) * r;
    let y = 100 + Math.sin(a) * r;

    path += (i === 0 ? "M" : "L") + x + " " + y + " ";
  }

  return path + "Z";
}

/* update（修复完整） */
function update() {

  if (!running) return;

  /* 物理 */
  for (let s of slimes) {
    s.vx *= 0.95;
    s.vy *= 0.95;

    s.x += s.vx;
    s.y += s.vy;
  }

  /* 碰撞 */
  for (let i = 0; i < slimes.length; i++) {
    for (let j = i + 1; j < slimes.length; j++) {

      let a = slimes[i];
      let b = slimes[j];

      let dx = b.x - a.x;
      let dy = b.y - a.y;

      let dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
      let minDist = 150;

      if (dist < minDist) {

        let force = (minDist - dist) * 0.02;

        let nx = dx / dist;
        let ny = dy / dist;

        a.vx -= nx * force;
        a.vy -= ny * force;

        b.vx += nx * force;
        b.vy += ny * force;
      }
    }
  }

  /* 渲染 */
  for (let s of slimes) {

    s.x = Math.max(80, Math.min(window.innerWidth - 80, s.x));
    s.y = Math.max(80, Math.min(window.innerHeight - 80, s.y));

    let angle = Math.atan2(s.vy, s.vx);

    let stretchX = 1 + s.vx * 0.02;
    let stretchY = 1 - s.vy * 0.02;

    s.el.style.transform =
      `translate(${s.x - 110}px, ${s.y - 110}px)
       rotate(${angle}rad)
       scale(${s.scale * stretchX}, ${s.scale * stretchY})`;

    s.blob.setAttribute("d", makeBlob(performance.now(), s.scale));
  }

  requestAnimationFrame(update);
}

/* 启动 */
document.getElementById("btn").onclick = async () => {
  try {
    await startCamera();
    createSlimes();
    running = true;
    update();
  } catch (err) {
    console.error("摄像头启动失败：", err);
  }
};

</script>

</body>
</html>
