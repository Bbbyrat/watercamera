<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Camera Slime Touch</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
    }

    button {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 12px 20px;
      font-size: 16px;
    }

    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 99999;
      color: white;
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 8px;
      border-radius: 6px;
      font-family: monospace;
    }

   #slime {
    position: fixed;
     left: 0;
     top: 0;
     width: 180px;
     height: 180px;
   }
  </style>
</head>

<body>

  <video id="video" autoplay playsinline></video>

  <svg id="slime" viewBox="0 0 200 200">
  <path id="blob"
    fill="url(#grad)"
    d="M100 100"
  />

  <defs>
    <radialGradient id="grad">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)" />
      <stop offset="50%" stop-color="rgba(140,210,255,0.75)" />
      <stop offset="100%" stop-color="rgba(40,120,255,0.6)" />
    </radialGradient>
  </defs>
</svg>

  <div id="debug">touch to move slime</div>

  <button id="snap">启动</button>
  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById("video");
    const button = document.getElementById("snap");
    const slime = document.getElementById("slime");
    const debug = document.getElementById("debug");

    let x = window.innerWidth / 2;
    let y = window.innerHeight / 2;

    let vx = 0;
    let vy = 0;

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });

      video.srcObject = stream;
    }

  
    window.addEventListener("touchmove", (e) => {
      let t = e.touches[0];

      let dx = t.clientX - window.innerWidth / 2;
      let dy = t.clientY - window.innerHeight / 2;

      vx += dx * 0.0002;
      vy += dy * 0.0002;

      debug.innerText =
         "dx: " + dx.toFixed(1) +
         "\ndy: " + dy.toFixed(1) +
         "\nvx: " + vx.toFixed(3) +
         "\nvy: " + vy.toFixed(3);
         });

    function update() {
      vx *= 0.95;
      vy *= 0.95;

      x += vx;
      y += vy;

      x = Math.max(80, Math.min(window.innerWidth - 80, x));
      y = Math.max(80, Math.min(window.innerHeight - 80, y));

      let speed = Math.sqrt(vx * vx + vy * vy);

      let stretchX = 1 + vx * 0.01;
      let stretchY = 1 + vy * 0.01;

      slime.style.transform = `
        translate(${x - 90}px, ${y - 90}px)
        scale(5)
        scale(${stretchX}, ${stretchY})
      `;

      requestAnimationFrame(update);
    }

    button.onclick = async function () {
      await startCamera();
    };

    update();
   
   function makeBlob() {
  const points = 20; // ⭐增加点数（越多越圆）
  const step = (Math.PI * 2) / points;

  let path = "";

  for (let i = 0; i < points; i++) {

    let angle = i * step;

    // 🧠 核心：让变化变“连续”
    let noise = Math.sin(i * 0.8) * 8 + Math.random() * 4;

    let r = 80 + noise;

    let x = 100 + Math.cos(angle) * r;
    let y = 100 + Math.sin(angle) * r;

    path += (i === 0 ? "M" : "L") + x + " " + y + " ";
  }

  path += "Z";
  return path;
}

    const blob = document.getElementById("blob");

    function initBlob() {
      blob.setAttribute("d", makeBlob());
    }

    initBlob();
    setInterval(() => {
     blob.setAttribute("d", makeBlob());
     }, 1200);
  </script>

</body>
</html>
