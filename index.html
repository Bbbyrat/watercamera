<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Camera Slime Touch</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
}

button {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  padding: 12px 20px;
  font-size: 16px;
}

#debug {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 99999;
  color: white;
  font-size: 14px;
  background: rgba(0,0,0,0.5);
  padding: 8px;
  border-radius: 6px;
  font-family: monospace;
}

#slime {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 220px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<svg id="slime" viewBox="0 0 200 200">
  <path id="blob" fill="url(#grad)" d="" />

  <defs>
    <radialGradient id="grad">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)" />
      <stop offset="50%" stop-color="rgba(140,210,255,0.75)" />
      <stop offset="100%" stop-color="rgba(40,120,255,0.6)" />
    </radialGradient>
  </defs>
</svg>

<div id="debug">touch to move slime</div>
<button id="snap">启动</button>

<script>

const video = document.getElementById("video");
const button = document.getElementById("snap");
const debug = document.getElementById("debug");

let slimes = [];

let baseScale = 3.2;

/* 摄像头 */
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
  });

  video.srcObject = stream;
}
  /* 🟢 创建3个史莱姆（核心改造点） */
function createSlimes() {

  const sizes = [3.2, 2.2, 1.4];

  for (let i = 0; i < 3; i++) {

    let node = document.getElementById("slime").cloneNode(true);
    node.removeAttribute("id");
    document.body.appendChild(node);

    slimes.push({
      el: node,

      x: window.innerWidth * (0.3 + i * 0.2),
      y: window.innerHeight * 0.5,

      vx: 0,
      vy: 0,

      scale: sizes[i]
    });
  }

  // 删除模板
  document.getElementById("slime").remove();
}


/* touch */
window.addEventListener("touchmove", (e) => {
  let t = e.touches[0];

  let dx = t.clientX - window.innerWidth / 2;
  let dy = t.clientY - window.innerHeight / 2;

  slimes[0].vx += dx * 0.0006;
  slimes[0].vy += dy * 0.0006;
  
  debug.innerText =
    "dx: " + dx.toFixed(1) +
    "\ndy: " + dy.toFixed(1) +
    "\nvx: " + slimes[0].vx.toFixed(3) +
    "\nvy: " + slimes[0].vy.toFixed(3);
});

/* 🟢 主更新（多体系统） */
function update() {

  for (let s of slimes) {

    s.vx *= 0.95;
    s.vy *= 0.95;

    s.x += s.vx;
    s.y += s.vy;
  }

  /* 🟢 碰撞系统 */
  for (let i = 0; i < slimes.length; i++) {
    for (let j = i + 1; j < slimes.length; j++) {

      let a = slimes[i];
      let b = slimes[j];

      let dx = b.x - a.x;
      let dy = b.y - a.y;

      let dist = Math.sqrt(dx * dx + dy * dy);
      let minDist = 150;

      if (dist < minDist) {

        let force = (minDist - dist) * 0.02;

        let nx = dx / dist;
        let ny = dy / dist;

        a.vx -= nx * force;
        a.vy -= ny * force;

        b.vx += nx * force;
        b.vy += ny * force;
      }
    }
  }

  /* 🟢 渲染 */
  for (let s of slimes) {

    s.x = Math.max(80, Math.min(window.innerWidth - 80, s.x));
    s.y = Math.max(80, Math.min(window.innerHeight - 80, s.y));

    let angle = Math.atan2(s.vy, s.vx);

    let speed = Math.sqrt(s.vx * s.vx + s.vy * s.vy);

    let stretchX = 1 + s.vx * 0.02;
    let stretchY = 1 - s.vy * 0.02;

    s.el.style.transform =
      `translate(${s.x - 110}px, ${s.y - 110}px)
       rotate(${angle}rad)
       scale(${s.scale * stretchX}, ${s.scale * stretchY})`;
  }

  requestAnimationFrame(update);
}

/* 🟢 blob动画（保留你的原逻辑，但给每个都动） */
function animateBlob(time) {

  let blobs = document.querySelectorAll("#blob");

  blobs.forEach((blob, i) => {

    blob.setAttribute("d", makeBlob(time + i * 1000));
  });

  requestAnimationFrame(animateBlob);
}
  /* 🟢 blob生成 */
function makeBlob(time) {

  const points = 20;
  const step = Math.PI * 2 / points;

  let path = "";

  for (let i = 0; i < points; i++) {

    let angle = i * step;

    let wave =
      Math.sin(i * 0.8 + time * 0.002) * 6 +
      Math.sin(i * 1.7 - time * 0.0015) * 4;

    let r = 80 + wave;

    let px = 100 + Math.cos(angle) * r;
    let py = 100 + Math.sin(angle) * r;

    path += (i === 0 ? "M" : "L") + px + " " + py + " ";
  }

  return path + "Z";
}

/* 启动 */
button.onclick = async function () {
  await startCamera();
  update();
  animateBlob(0);
};

</script>

</body>
</html>
