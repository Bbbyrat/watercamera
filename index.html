<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>移动你的水宝宝然后和它合照</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(
    180deg,
    #001a4d,
    #003a99
  );
}

/* ⭐ 新增：外框 */
#frame {
  position: fixed;
  width: 80vw;
  height: 80vh;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);

  border: 6px solid #1e90ff;

  box-shadow:
    0 0 15px #1e90ff,
    0 0 10px rgba(30, 144, 255, 0.6),
    inset 0 0 30px rgba(0, 80, 200, 0.4);

  overflow: hidden;
}

/* 摄像头画面 */
video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}
 #video2 {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;

  filter: blur(10px) contrast(1.2);
  opacity: 0.0; /* ⭐ 不再整屏显示 */
}

#fx {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 2;
  pointer-events: none;
}
/* 史莱姆层 */
#container {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* 史莱姆 */
.slime {
  position: absolute;
  width: 220px;
  height: 220px;
  left: 0;
  top: 0;
}

#btn {
  position: fixed;

  /* ⭐ 放进 frame 内部 */
  top: calc(45% + 80vh / 2 - 60px);

  left: 50%;
  transform: translateX(-50%);

  z-index: 10;

  padding: 14px 26px;
  font-size: 16px;

  border-radius: 10px;

  background: rgba(30,144,255,0.8);
  color: white;
  border: none;

  box-shadow: 0 0 15px rgba(30,144,255,0.6);
}

#debug {
  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
  font-family: monospace;
  font-size: 12px;
  background: rgba(0,0,0,0.5);
  padding: 6px;
}
  #footer {
  position: absolute;
  bottom: 18px;
  left: 0;
  width: 100%;

  display: flex;
  justify-content: space-evenly;
  align-items: center;

  z-index: 5;
  pointer-events: none;
}
  #footer img {
  width: 350px;
  height: 200px;

  object-fit: cover;
  object-position: center;
  opacity: 0.9;
}
  
</style>
</head>

<body>

<!-- ⭐ 新结构：frame 包起来 -->
<div id="overlay"></div>
<div id="frame">
  <video id="video2" autoplay playsinline></video>
  <canvas id="fx"></canvas>
  <video id="video" autoplay playsinline></video>
  <div id="container"></div>
</div>
  <div id="footer">
  <img src="111.jpg" />
  <img src="222.jpg" />
  <img src="333.jpg" />
</div>

<!-- 模板 -->
<div id="template" class="slime">
<svg viewBox="0 0 200 200">
  <path class="blob" fill="url(#grad)"></path>

  <defs>
    <radialGradient id="grad">
      <stop offset="0%" stop-color="rgba(180,230,255,0.95)" />
      <stop offset="40%" stop-color="rgba(80,170,255,0.8)" />
      <stop offset="100%" stop-color="rgba(0,90,255,0.35)" />
    </radialGradient>
  </defs>
</svg>
</div>

<button id="btn">TAP ME</button>

<script>

const video = document.getElementById("video");
const container = document.getElementById("container");
const captureCanvas = document.createElement("canvas");
const ctx = captureCanvas.getContext("2d");
const fx = document.getElementById("fx");
const fxc = fx.getContext("2d");

let slimes = [];
let running = false;

/* 摄像头 */
function resizeFX() {
  fx.width = window.innerWidth;
  fx.height = window.innerHeight;
}
window.addEventListener("resize", resizeFX);
resizeFX();
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
  });

  video.srcObject = stream;
}

/* 创建史莱姆 */
function createSlimes() {

  const sizes = [3.2, 2.2, 1.4];
  const template = document.getElementById("template");

  for (let i = 0; i < 3; i++) {

    let node = template.cloneNode(true);
    node.removeAttribute("id");
    container.appendChild(node);

    slimes.push({
      el: node,
      blob: node.querySelector(".blob"),

      x: window.innerWidth * (0.3 + i * 0.2),
      y: window.innerHeight * 0.5,

      vx: 0,
      vy: 0,

      scale: sizes[i]
    });
  }

  template.remove();
}

/* touch控制 */
window.addEventListener("touchmove", (e) => {

  if (!slimes[0]) return;

  let t = e.touches[0];

  let dx = t.clientX - window.innerWidth / 2;
  let dy = t.clientY - window.innerHeight / 2;

  slimes[0].vx += dx * 0.0007;
  slimes[0].vy += dy * 0.0007;
});

/* blob */
function makeBlob(time, offset = 0) {

  const points = 20;
  const step = Math.PI * 2 / points;

  let path = "";

  for (let i = 0; i < points; i++) {

    let a = i * step;

    let wave =
      Math.sin(i * 0.8 + time * 0.002 + offset) * 6 +
      Math.sin(i * 1.7 - time * 0.0015 + offset) * 4;

    let r = 80 + wave;

    let x = 100 + Math.cos(a) * r;
    let y = 100 + Math.sin(a) * r;

    path += (i === 0 ? "M" : "L") + x + " " + y + " ";
  }

  return path + "Z";
}

/* update */
function update() {
  fxc.clearRect(0, 0, fx.width, fx.height);
  if (!running) return;

  for (let s of slimes) {

    s.vx *= 0.95;
    s.vy *= 0.95;

    s.x += s.vx;
    s.y += s.vy;
    
    if (slimes.length > 0) {
    let s = slimes[0];

    video2.style.transform =
      `translate(${s.vx * 2}px, ${s.vy * 2}px) scale(1.02)`;
  }
  }

  /* 碰撞 */
  for (let i = 0; i < slimes.length; i++) {
    for (let j = i + 1; j < slimes.length; j++) {

      let a = slimes[i];
      let b = slimes[j];

      let dx = b.x - a.x;
      let dy = b.y - a.y;

      let dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
      let minDist = 150;

      if (dist < minDist) {

        let force = (minDist - dist) * 0.02;

        let nx = dx / dist;
        let ny = dy / dist;

        a.vx -= nx * force;
        a.vy -= ny * force;

        b.vx += nx * force;
        b.vy += ny * force;
      }
    }
  }

  /* 渲染 */
  for (let s of slimes) {

    s.x = Math.max(80, Math.min(window.innerWidth - 80, s.x));
    s.y = Math.max(80, Math.min(window.innerHeight - 80, s.y));

    let angle = Math.atan2(s.vy, s.vx);

    let stretchX = 1 + s.vx * 0.02;
    let stretchY = 1 - s.vy * 0.02;

    s.el.style.transform =
      `translate(${s.x - 110}px, ${s.y - 110}px)
       rotate(${angle}rad)
       scale(${s.scale * stretchX}, ${s.scale * stretchY})`;

    s.blob.setAttribute("d", makeBlob(performance.now(), s.scale));
  }

  requestAnimationFrame(update);
}
  function capture() {

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const w = frame.clientWidth;
  const h = frame.clientHeight;

  canvas.width = w;
  canvas.height = h;

  // ⭐ 1. 画视频底层
  ctx.drawImage(video, 0, 0, w, h);

  // ⭐ 2. 画第二层视频（如果你有 video2）
  if (video2 && video2.srcObject) {
    ctx.globalAlpha = 0.4;
    ctx.drawImage(video2, 0, 0, w, h);
    ctx.globalAlpha = 1;
  }

  // ⭐ 3. 画史莱姆（直接截图 DOM）
  html2canvas(container).then(slimeCanvas => {

    ctx.drawImage(slimeCanvas, 0, 0, w, h);

    // ⭐ 导出
    const link = document.createElement("a");
    link.download = "slime_capture.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}
for (let s of slimes) {

  const r = 120 * s.scale;

  fxc.save();

  // ⭐ 圆形区域
  fxc.beginPath();
  fxc.arc(s.x, s.y, r, 0, Math.PI * 2);
  fxc.clip();

  // ⭐ 取 video2（模糊源）
  const zoom = 1.5;

  const sx = s.x - r;
  const sy = s.y - r;

  const sw = r * 2;
  const sh = r * 2;

  // ⭐ 放大 + 模糊来源
  fxc.drawImage(
    video,
    sx - (zoom - 1) * r,
    sy - (zoom - 1) * r,
    sw * zoom,
    sh * zoom,
    sx,
    sy,
    sw,
    sh
  );

  // ⭐ 发光边缘（不改你颜色体系）
  fxc.strokeStyle = "rgba(80,170,255,0.9)";
  fxc.lineWidth = 5;
  fxc.shadowBlur = 20;
  fxc.shadowColor = "rgba(80,170,255,0.8)";
  fxc.stroke();

  fxc.restore();
}
/* 启动 */
document.getElementById("btn").onclick = async () => {

  // ⭐ 第一次点击：启动系统
  if (!running) {
    await startCamera();
    createSlimes();
    running = true;
    update();
    return;
  }

  // ⭐ 第二次点击：下载截图
  capture();
};

</script>

</body>
</html>
