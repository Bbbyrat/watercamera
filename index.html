<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Slime Field System</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* 🎥 摄像头 */
video {
  position: fixed;
  width: 100vw;
  height: 100vh;
  object-fit: cover;

  filter:
    contrast(1.2)
    saturate(1.4)
    hue-rotate(165deg)
    brightness(0.85);
}

/* 🌫️ 氛围层 */
#overlay {
  position: fixed;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  background: radial-gradient(
    circle at center,
    rgba(120, 255, 240, 0.10),
    rgba(0, 30, 80, 0.55)
  );
  mix-blend-mode: screen;
}

#container {
  position: fixed;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
}

.slime {
  position: absolute;
  width: 220px;
  height: 220px;
  left: 0;
  top: 0;
}

button {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  padding: 10px 18px;
}

#debug {
  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
  font-family: monospace;
  font-size: 12px;
  background: rgba(0,0,0,0.5);
  padding: 6px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="overlay"></div>
<div id="container"></div>

<!-- 模板 -->
<div id="template" class="slime">
<svg viewBox="0 0 200 200">
  <path class="blob" fill="url(#grad)"></path>

  <defs>
    <radialGradient id="grad">
      <stop offset="0%" stop-color="rgba(180,255,255,0.95)" />
      <stop offset="40%" stop-color="rgba(80,180,255,0.75)" />
      <stop offset="100%" stop-color="rgba(0,90,255,0.25)" />
    </radialGradient>
  </defs>
</svg>
</div>

<button id="btn">START</button>
<div id="debug">ready</div>

<script>

const video = document.getElementById("video");
const container = document.getElementById("container");
const debug = document.getElementById("debug");

let slimes = [];
let running = false;

/* 摄像头 */
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
  });

  video.srcObject = stream;
}

/* 🌊 创建5个史莱姆 */
function createSlimes() {

  const sizes = [3.4, 3.0, 2.6, 2.3, 2.0];
  const template = document.getElementById("template");

  for (let i = 0; i < 5; i++) {

    let node = template.cloneNode(true);
    node.removeAttribute("id");
    container.appendChild(node);

    slimes.push({
      el: node,
      blob: node.querySelector(".blob"),

      x: window.innerWidth * (0.2 + Math.random() * 0.6),
      y: window.innerHeight * (0.2 + Math.random() * 0.6),

      vx: (Math.random() - 0.5) * 2,
      vy: (Math.random() - 0.5) * 2,

      scale: sizes[i],

      speed: 0.8 + Math.random() * 1.2,
      damping: 0.92 + Math.random() * 0.05,
      noise: 0.02 + Math.random() * 0.05
    });
  }

  // 初始化 blob（关键）
  for (let s of slimes) {
    s.blob.setAttribute("d", makeBlob(performance.now(), 0));
  }

  template.remove();
}

/* 🌬️ 风场控制 */
window.addEventListener("touchmove", (e) => {

  let t = e.touches[0];
  let force = 0.00035;

  for (let s of slimes) {

    let dx = t.clientX - s.x;
    let dy = t.clientY - s.y;

    let dist = Math.sqrt(dx*dx + dy*dy) + 0.001;
    let f = force / dist * 80;

    s.vx += dx * f;
    s.vy += dy * f;
  }
});

/* 🌊 blob */
function makeBlob(time, offset = 0) {

  const points = 20;
  const step = Math.PI * 2 / points;

  let path = "";

  for (let i = 0; i < points; i++) {

    let a = i * step;

    let wave =
      Math.sin(i * 0.8 + time * 0.002 + offset) * 7 +
      Math.sin(i * 1.7 - time * 0.0015 + offset) * 5;

    let r = 80 + wave;

    let x = 100 + Math.cos(a) * r;
    let y = 100 + Math.sin(a) * r;

    path += (i === 0 ? "M" : "L") + x + " " + y + " ";
  }

  return path + "Z";
}

/* 🧠 主循环 */
function update() {

  if (!running) {
    requestAnimationFrame(update);
    return;
  }

  for (let s of slimes) {

    s.vx *= s.damping;
    s.vy *= s.damping;

    s.vx += (Math.random() - 0.5) * s.noise;
    s.vy += (Math.random() - 0.5) * s.noise;

    s.x += s.vx;
    s.y += s.vy;
  }

  /* 碰撞 */
  for (let i = 0; i < slimes.length; i++) {
    for (let j = i + 1; j < slimes.length; j++) {

      let a = slimes[i];
      let b = slimes[j];

      let dx = b.x - a.x;
      let dy = b.y - a.y;

      let dist = Math.sqrt(dx*dx + dy*dy) || 0.001;
      let minDist = 140;

      if (dist < minDist) {

        let force = (minDist - dist) * 0.015;

        let nx = dx / dist;
        let ny = dy / dist;

        a.vx -= nx * force;
        a.vy -= ny * force;

        b.vx += nx * force;
        b.vy += ny * force;
      }
    }
  }

  /* 渲染 */
  for (let s of slimes) {

    s.x = Math.max(80, Math.min(window.innerWidth - 80, s.x));
    s.y = Math.max(80, Math.min(window.innerHeight - 80, s.y));

    let angle = Math.atan2(s.vy, s.vx);

    let stretchX = 1 + s.vx * 0.02;
    let stretchY = 1 - s.vy * 0.02;

    s.el.style.transform =
      `translate(${s.x - 110}px, ${s.y - 110}px)
       rotate(${angle}rad)
       scale(${s.scale * stretchX}, ${s.scale * stretchY})`;

    s.blob.setAttribute("d", makeBlob(performance.now(), s.scale));
  }

  debug.innerText = `slimes: ${slimes.length}`;

  requestAnimationFrame(update);
}

/* 启动 */
document.getElementById("btn").onclick = async () => {

  await startCamera();

  createSlimes();

  running = true;

  update();
};

</script>

</body>
</html>
