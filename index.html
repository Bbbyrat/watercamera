<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Slime Camera Clean Version</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video {
      display: none; /* 不直接显示，用canvas画 */
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }

    #slime {
      position: fixed;
      width: 220px;
      height: 220px;
      left: 0;
      top: 0;
      z-index: 10;
      pointer-events: none;
    }

    button {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 12px 20px;
      font-size: 16px;
    }

    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
      color: white;
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 6px 10px;
      border-radius: 6px;
      font-family: monospace;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="slime">
<svg viewBox="0 0 200 200">
  <path id="blob" fill="url(#grad)" d=""></path>

  <defs>
    <radialGradient id="grad">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)" />
      <stop offset="50%" stop-color="rgba(140,210,255,0.75)" />
      <stop offset="100%" stop-color="rgba(40,120,255,0.6)" />
    </radialGradient>
  </defs>
</svg>
</div>

<button id="btn">启动</button>
<div id="debug">ready</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const slime = document.getElementById("slime");
const debug = document.getElementById("debug");

let x = window.innerWidth / 2;
let y = window.innerHeight / 2;

let vx = 0;
let vy = 0;

let slimeScale = 1.8;

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
  });

  video.srcObject = stream;
  await video.play();

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener("resize", () => {
   canvas.width = window.innerWidth;
   canvas.height = window.innerHeight;
 });
  draw();
  }


function draw() {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  requestAnimationFrame(draw);
}

/* 🟢 touch 控制 */
window.addEventListener("touchmove", (e) => {
  let t = e.touches[0];

  let dx = t.clientX - window.innerWidth / 2;
  let dy = t.clientY - window.innerHeight / 2;

  vx += dx * 0.0003;
  vy += dy * 0.0003;
});

/* 🟢 动画 */
function update() {

  vx *= 0.92;
  vy *= 0.92;

  x += vx;
  y += vy;

  x = Math.max(100, Math.min(window.innerWidth - 100, x));
  y = Math.max(100, Math.min(window.innerHeight - 100, y));

  let speed = Math.sqrt(vx*vx + vy*vy);

  let stretchX = 1 + vx * 0.01;
  let stretchY = 1 + vy * 0.01;

  slime.style.transform = `
    translate(${x - 110}px, ${y - 110}px)
    scale(${slimeScale})
    scale(${stretchX}, ${stretchY})
  `;

  debug.innerText =
    "speed: " + speed.toFixed(3);

  requestAnimationFrame(update);
}

/* 🟢 史莱姆形状 */
function makeBlob() {
  const points = 18;
  const step = Math.PI * 2 / points;

  let path = "";

  for (let i = 0; i < points; i++) {
    let angle = i * step;
    let noise = Math.sin(i * 0.8) * 6 + Math.random() * 3;
    let r = 70 + noise;

    let px = 100 + Math.cos(angle) * r;
    let py = 100 + Math.sin(angle) * r;

    path += (i === 0 ? "M" : "L") + px + " " + py + " ";
  }

  path += "Z";
  return path;
}

function animateBlob() {
  document.getElementById("blob")
    .setAttribute("d", makeBlob());

  requestAnimationFrame(animateBlob);
}

document.getElementById("btn").onclick = () => {
  startCamera();
  update();
  animateBlob();
};
</script>

</body>
</html>
