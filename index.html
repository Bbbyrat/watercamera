<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Multi Slime System</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
}

button {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  padding: 12px 20px;
  font-size: 16px;
}

#debug {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 9999;
  color: white;
  font-size: 14px;
  background: rgba(0,0,0,0.5);
  padding: 8px;
  border-radius: 6px;
  font-family: monospace;
}

/* 🟢 每个史莱姆 */
.slime {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 220px;
  pointer-events: none;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<!-- 🟢 模板史莱姆 -->
<div id="template" class="slime">
<svg viewBox="0 0 200 200">
  <path fill="url(#grad)" d="" id="blob"></path>

  <defs>
    <radialGradient id="grad">
      <stop offset="0%" stop-color="rgba(255,255,255,0.7)" />
      <stop offset="50%" stop-color="rgba(140,210,255,0.4)" />
      <stop offset="100%" stop-color="rgba(40,120,255,0.2)" />
    </radialGradient>
  </defs>
</svg>
</div>

<button id="btn">启动</button>
<div id="debug">ready</div>

<script>

const video = document.getElementById("video");
const debug = document.getElementById("debug");

let slimes = [];

/* 🟢 创建三个不同大小的史莱姆 */
function createSlimes() {

  const sizes = [3.2, 2.2, 1.4]; // 大中小

  for (let i = 0; i < 3; i++) {

    let node = document.getElementById("template").cloneNode(true);
    document.body.appendChild(node);

    slimes.push({
      el: node,

      x: window.innerWidth * (0.3 + i * 0.15),
      y: window.innerHeight * 0.5,

      vx: 0,
      vy: 0,

      scale: sizes[i]
    });
  }

  document.getElementById("template").remove();
}

/* 🟢 touch控制（控制最大那个） */
window.addEventListener("touchmove", (e) => {

  let t = e.touches[0];

  let dx = t.clientX - window.innerWidth / 2;
  let dy = t.clientY - window.innerHeight / 2;

  slimes[0].vx += dx * 0.0008;
  slimes[0].vy += dy * 0.0008;
});

/* 🟢 物理 + 碰撞 */
function update() {

  // 移动
  for (let s of slimes) {

    s.vx *= 0.92;
    s.vy *= 0.92;

    s.x += s.vx;
    s.y += s.vy;
  }

  // 碰撞
  for (let i = 0; i < slimes.length; i++) {
    for (let j = i + 1; j < slimes.length; j++) {

      let a = slimes[i];
      let b = slimes[j];

      let dx = b.x - a.x;
      let dy = b.y - a.y;

      let dist = Math.sqrt(dx*dx + dy*dy);
      let minDist = 150;

      if (dist < minDist) {

        let force = (minDist - dist) * 0.02;

        let nx = dx / dist;
        let ny = dy / dist;

        a.vx -= nx * force;
        a.vy -= ny * force;

        b.vx += nx * force;
        b.vy += ny * force;
      }
    }
  }

  // 渲染
  for (let s of slimes) {

    s.x = Math.max(80, Math.min(window.innerWidth - 80, s.x));
    s.y = Math.max(80, Math.min(window.innerHeight - 80, s.y));

    let angle = Math.atan2(s.vy, s.vx);

    let stretchX = 1 + s.vx * 0.02;
    let stretchY = 1 - s.vy * 0.02;

    s.el.style.transform =
      `translate(${s.x - 110}px, ${s.y - 110}px)
       rotate(${angle}rad)
       scale(${s.scale * stretchX}, ${s.scale * stretchY})`;
  }

  requestAnimationFrame(update);
}

/* 🟢 摄像头 */
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
  });

  video.srcObject = stream;
}

/* 🟢 启动 */
document.getElementById("btn").onclick = async () => {
  await startCamera();
  createSlimes();
  update();
};

</script>

</body>
</html>
